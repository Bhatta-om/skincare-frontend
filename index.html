<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ── Viewport (critical for mobile) ── -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />

    <!-- ── Favicon ── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- ── Default SEO (overridden per-page by SEO.jsx) ── -->
    <title>SkinCare | Science-Backed Skincare</title>
    <meta name="description" content="Premium AI-powered skincare. Discover your skin type and find clinically proven products made for you." />
    <meta name="theme-color" content="#FAF8F5" />
    <meta name="robots" content="index, follow" />

    <!-- ── Open Graph ── -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="SkinCare" />
    <meta property="og:title"       content="SkinCare | Science-Backed Skincare" />
    <meta property="og:description" content="Premium AI-powered skincare. Discover your skin type and find clinically proven products made for you." />
    <meta property="og:url"         content="https://skincare.com" />

    <!-- ── Twitter Card ── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="SkinCare | Science-Backed Skincare" />
    <meta name="twitter:description" content="Premium AI-powered skincare. Discover your skin type and find clinically proven products made for you." />

    <!-- ── Canonical ── -->
    <link rel="canonical" href="https://skincare.com" />

    <!-- ── Preconnect to Google Fonts (performance) ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- ── Performance hints ── -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
